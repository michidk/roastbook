apiVersion: v1
kind: Service
metadata:
  name: {{ include "roastbook.fullname" . }}
  labels:
    {{- include "roastbook.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      {{- if .Values.hodor.enabled }}
      targetPort: gate
      {{- else }}
      targetPort: http
      {{- end }}
      protocol: TCP
      name: http
  selector:
    {{- include "roastbook.selectorLabels" . | nindent 4 }}
