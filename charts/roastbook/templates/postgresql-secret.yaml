{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "roastbook.postgresqlSecretName" . }}
  labels:
    {{- include "roastbook.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
stringData:
  password: {{ required "postgresql.auth.password is required when bundled postgresql is enabled" .Values.postgresql.auth.password | quote }}
  url: {{ printf "postgresql://%s:%s@%s:%v/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "roastbook.postgresqlName" .) .Values.postgresql.service.port .Values.postgresql.auth.database | quote }}
{{- end }}
